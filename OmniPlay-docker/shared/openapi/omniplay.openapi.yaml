openapi: 3.1.0
info:
  title: OmniPlay NAS API
  version: 1.5
paths:
  /api/health:
    get:
      summary: Service health and runtime paths
      responses:
        "200":
          description: Health status
  /api/runtime/self-check:
    get:
      summary: Run packaging-oriented runtime checks for FFmpeg, ports, storage, SQLite, WebDAV Range, and hardware encoding
      responses:
        "200":
          description: Runtime self-check snapshot
  /api/settings:
    get:
      summary: Read TMDB, playback, and cache settings
      responses:
        "200":
          description: Current settings
    put:
      summary: Update TMDB, playback, and cache settings
      responses:
        "200":
          description: Updated
  /api/sources/local:
    post:
      summary: Add a local NAS media directory
      responses:
        "200":
          description: Added or re-enabled local media source
  /api/sources/webdav:
    post:
      summary: Add or re-enable a WebDAV media source
      responses:
        "200":
          description: Added or re-enabled WebDAV media source
        "400":
          description: Invalid WebDAV URL
  /api/sources/webdav/test:
    post:
      summary: Test a WebDAV endpoint with optional Basic credentials
      responses:
        "200":
          description: WebDAV test result
        "400":
          description: Invalid URL or connection failure
  /api/sources/webdav/browse:
    post:
      summary: Browse WebDAV child directories with optional Basic credentials
      responses:
        "200":
          description: WebDAV directory listing
        "400":
          description: Invalid URL, authentication failure, or browse failure
  /api/sources/local/directories:
    get:
      summary: Browse local NAS directories for media source selection
      parameters:
        - name: path
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Directory listing
        "400":
          description: Directory missing or inaccessible
  /api/sources:
    get:
      summary: List media sources
      responses:
        "200":
          description: Media sources
  /api/sources/{sourceId}/scan:
    post:
      summary: Start a background scan for one enabled media source
      parameters:
        - name: sourceId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: Source scan accepted and running in background
        "409":
          description: A background task is already running
  /api/sources/{sourceId}:
    patch:
      summary: Rename or enable/disable a media source
      parameters:
        - name: sourceId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated media source
        "400":
          description: Invalid update request
        "404":
          description: Source not found
    delete:
      summary: Submit background cleanup for a removed media source
      parameters:
        - name: sourceId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: Media source cleanup accepted and running in background
        "409":
          description: Another background task is already running
  /api/tasks:
    get:
      summary: List current and recent background tasks
      responses:
        "200":
          description: Background task snapshot
  /api/tasks/events:
    get:
      summary: Stream background task snapshot changes with Server-Sent Events
      responses:
        "200":
          description: text/event-stream background task snapshot frames
  /api/tasks/{taskId}/cancel:
    post:
      summary: Cancel a running background task by id
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancellation requested
        "409":
          description: Task is missing or not running
  /api/cache/status:
    get:
      summary: Read poster, thumbnail, HLS, subtitle, and total cache usage
      responses:
        "200":
          description: Cache usage summary
  /api/playback/webdav/cache/cleanup:
    post:
      summary: Submit background cleanup for WebDAV playback cache
      parameters:
        - name: maxAgeHours
          in: query
          required: false
          schema:
            type: integer
        - name: maxGb
          in: query
          required: false
          schema:
            type: integer
      responses:
        "202":
          description: WebDAV cache cleanup accepted and running in background
        "409":
          description: Another background task is already running
  /api/playback/files/{fileId}/cache:
    get:
      summary: Read local or WebDAV playback cache status, including direct Range proxy availability
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Playback cache status
        "404":
          description: Video file not found
  /api/playback/files/{fileId}/cache/prepare:
    post:
      summary: Start WebDAV playback cache preparation for one video file
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Playback cache preparation started or already ready
        "404":
          description: Video file not found
  /api/playback/files/{fileId}/cache/cancel:
    post:
      summary: Cancel WebDAV playback cache preparation for one video file
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancellation requested or cache already idle
        "404":
          description: Video file not found
  /api/library/items:
    get:
      summary: List poster wall items
      responses:
        "200":
          description: Library items
  /api/library/items/{id}:
    get:
      summary: Read item detail with video files and episodes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Library item detail
        "404":
          description: Item not found
  /api/library/items/{id}/metadata/search:
    get:
      summary: Search TMDB candidates for one library item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: query
          in: query
          required: false
          schema:
            type: string
        - name: mediaType
          in: query
          required: false
          schema:
            type: string
            enum: [movie, tv, all]
        - name: year
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: TMDB metadata candidates
        "404":
          description: Item not found
  /api/library/items/{id}/metadata/apply:
    post:
      summary: Apply one TMDB candidate to a library item and lock metadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated library item detail
        "400":
          description: Invalid candidate
        "404":
          description: Item not found
  /api/library/items/{id}/metadata/lock:
    post:
      summary: Lock or unlock metadata for one library item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated library item detail
        "404":
          description: Item not found
  /api/library/scan:
    post:
      summary: Start a background scan for enabled local media sources
      responses:
        "202":
          description: Scan accepted and running in background
        "409":
          description: A scan is already running
  /api/library/scan/status:
    get:
      summary: Read current or last scan status
      responses:
        "200":
          description: Scan status
  /api/library/scan/events:
    get:
      summary: Stream scan status changes with Server-Sent Events
      responses:
        "200":
          description: text/event-stream scan status frames
  /api/library/scan/cancel:
    post:
      summary: Request cancellation for the running background scan
      responses:
        "200":
          description: Cancellation requested
        "409":
          description: No scan is currently running
  /api/library/scrape:
    post:
      summary: Start background metadata and poster scraping for all unlocked library items
      responses:
        "202":
          description: Scrape accepted and running in background
        "409":
          description: A scrape job is already running
  /api/library/scrape/status:
    get:
      summary: Read current or last metadata scraping status
      responses:
        "200":
          description: Metadata scraping status
  /api/library/scrape/events:
    get:
      summary: Stream metadata scraping status changes with Server-Sent Events
      responses:
        "200":
          description: text/event-stream metadata scraping status frames
  /api/library/scrape/cancel:
    post:
      summary: Request cancellation for the running metadata scraping job
      responses:
        "200":
          description: Cancellation requested
        "409":
          description: No scrape job is currently running
  /api/library/items/{id}/rescrape:
    post:
      summary: Start background metadata and poster scraping for one library item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Scrape accepted and running in background
        "409":
          description: A scrape job is already running
  /api/assets/posters/{id}:
    get:
      summary: Read cached poster image
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Poster image
  /api/assets/thumbnails/{id}:
    get:
      summary: Read cached thumbnail image
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Thumbnail image
  /api/assets/cache/cleanup:
    post:
      summary: Start a background cleanup for orphan poster and thumbnail assets
      responses:
        "202":
          description: Cleanup accepted and running in background
        "409":
          description: Another background task is already running
  /api/playback/progress:
    post:
      summary: Save playback progress for one video file
      responses:
        "204":
          description: Progress saved
  /api/playback/watched:
    post:
      summary: Mark one video file watched or unwatched
      responses:
        "204":
          description: Watched status saved
  /api/playback/files/{fileId}/stream:
    get:
      summary: Stream one indexed local or WebDAV video file with HTTP Range support
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Video stream
        "206":
          description: Partial video stream
        "404":
          description: Video file not found or not playable
  /api/playback/capabilities:
    get:
      summary: Detect FFmpeg availability, hardware decoders, hardware encoders, and accelerators
      responses:
        "200":
          description: FFmpeg transcode capabilities
  /api/playback/decision/{fileId}:
    get:
      summary: Resolve direct stream, FFmpeg HLS remux, or FFmpeg HLS transcode playback mode
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
        - name: quality
          in: query
          required: false
          schema:
            type: string
            enum: [original, 1080p, 720p, 480p, 360p]
        - name: audioTrackIndex
          in: query
          required: false
          schema:
            type: integer
        - name: subtitleMode
          in: query
          required: false
          schema:
            type: string
            enum: [off, web, burn]
        - name: subtitleId
          in: query
          required: false
          schema:
            type: string
        - name: hardware
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Playback decision
        "404":
          description: Video file not found or not playable
  /api/playback/diagnostics/{fileId}:
    get:
      summary: Preview playback chain, cache requirements, and FFmpeg command without starting playback
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
        - name: quality
          in: query
          required: false
          schema:
            type: string
        - name: audioTrackIndex
          in: query
          required: false
          schema:
            type: integer
        - name: subtitleMode
          in: query
          required: false
          schema:
            type: string
            enum: [off, web, burn]
        - name: subtitleId
          in: query
          required: false
          schema:
            type: string
        - name: hardware
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Playback diagnostics
        "404":
          description: Video file not found or not playable
  /api/playback/files/{fileId}/subtitles:
    get:
      summary: List local or WebDAV external subtitle files next to one indexed video
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: External subtitle tracks
        "404":
          description: Video file not found or not playable
  /api/playback/files/{fileId}/subtitles/{subtitleId}.vtt:
    get:
      summary: Read local or cached WebDAV SRT/VTT subtitle as WebVTT
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
        - name: subtitleId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: WebVTT subtitle
        "404":
          description: Subtitle not found or not convertible
  /api/playback/hls/{sessionId}/{assetName}:
    get:
      summary: Read generated HLS manifest or segment
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
        - name: assetName
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: HLS asset
        "206":
          description: Partial HLS segment
        "404":
          description: HLS asset not found
  /api/playback/hls/{sessionId}/stop:
    post:
      summary: Stop a running HLS remux/transcode session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Session stopped
        "404":
          description: Session not found
  /api/playback/hls/cleanup:
    post:
      summary: Start background cleanup of old HLS cache directories
      parameters:
        - name: maxAgeHours
          in: query
          required: false
          schema:
            type: integer
      responses:
        "202":
          description: Cleanup task accepted and running in background
        "409":
          description: Another background task is already running
