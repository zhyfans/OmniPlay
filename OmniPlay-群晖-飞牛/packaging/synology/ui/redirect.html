<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>打开 OmniPlay</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #101418;
        color: #f4f7fb;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      a {
        color: #7dd3fc;
      }
    </style>
  </head>
  <body>
    <main>
      <p>正在打开 OmniPlay…</p>
      <p><a id="fallback" href="#">如果没有自动跳转，请点击这里。</a></p>
    </main>
    <script>
      const servicePort = "45721";
      const hostname = window.location.hostname;
      const host = hostname.includes(":") && !hostname.startsWith("[")
        ? `[${hostname}]`
        : hostname;
      const target = `http://${host}:${servicePort}/`;
      const fallback = document.getElementById("fallback");
      fallback.href = target;
      window.location.replace(target);
    </script>
  </body>
</html>
